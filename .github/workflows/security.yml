name: Scheduled security scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install OSV-Scanner and Gitleaks
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.5
          go install github.com/zricethezav/gitleaks/v8@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install Semgrep CE
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user semgrep
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Dependency vulnerability scan
        run: npm run security:deps

      - name: Secret scan
        run: npm run security:secrets

      - name: Static analysis security scan
        run: npm run security:sast
